name: Update Macro Data

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fredapi pandas requests # 핵심: requests 추가

      - name: Run scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python update_macro.py
          python update_fear_greed.py
          python update_index.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 파일이 실제로 생성되었는지 확인 후 add
          git add macro_optimized.json fear_greed.json index_data.json || echo "Files not found"
          
          # 변경사항이 있는지 확인하고 있을 때만 실행
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update data: $(date +'%Y-%m-%d')"
            git push
          else
            echo "No changes to commit"
          fi
