name: Update Macro Data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fredapi pandas requests # 핵심: requests 추가

      - name: Run scripts
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python update_macro.py
          python update_fear_greed.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add macro_optimized.json fear_greed.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update data" && git push)
