name: Update Macro Data

on:
  schedule:
    # 매일 한국 시간 오전 9시 (UTC 00:00)에 실행
    - cron: '0 0 * * *'
  workflow_dispatch: # 버튼을 눌러 수동으로도 실행 가능하게 설정

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fredapi pandas

      - name: Run data collection script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python update_macro.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add macro_optimized.json
          git commit -m "Auto-update macro data: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
