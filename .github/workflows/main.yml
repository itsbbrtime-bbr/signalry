name: Update Macro Data

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시
  workflow_dispatch:

# 128 에러 해결을 위한 권한 추가
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v3 -> v4 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5 # v4 -> v5 업데이트
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fredapi pandas

      - name: Run data collection script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python update_macro.py
          python update_fear_greed.py 

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add macro_optimized.json fear_greed.json 
          
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update macro and fng data: $(date +'%Y-%m-%d')" && git push)
